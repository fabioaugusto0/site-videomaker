<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecionando para o WhatsApp | Fábio Augusto</title>
    <script>
        !function (f, b, e, v, n, t, s) {
            if (f.fbq) return; n = f.fbq = function () {
                n.callMethod ?
                    n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
            n.queue = []; t = b.createElement(e); t.async = !0;
            t.src = v; s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1015192737472352');
        fbq('track', 'PageView');
    </script>
    <noscript>
        <img height="1" width="1" style="display:none"
            src="https://www.facebook.com/tr?id=1015192737472352&ev=Contact&noscript=1" />
    </noscript>
    <style>
        :root {
            color-scheme: dark;
            --bg: #080810;
            --text: #ffffff;
            --muted: #d4a8ff;
            --accent: #c840f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            text-align: center;
        }

        main {
            width: min(100%, 520px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(28px, 6vw, 44px);
            line-height: 1;
        }

        p {
            margin: 0 auto 24px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.5;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 22px;
            border-radius: 999px;
            background: var(--accent);
            color: var(--text);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <main>
        <h1>Redirecionando</h1>
        <p>Estamos abrindo o WhatsApp para continuar sua conversa.</p>
        <a id="whatsapp-link" href="https://wa.me/5585992300926" rel="noopener noreferrer">Abrir WhatsApp</a>
    </main>

    <script>
        const fallbackText = 'Olá Fábio! Vim pelo seu site e quero um diagnóstico para meu consultório.';
        const leadPrefix = 'FAV';
        const storageKey = 'fabio_whatsapp_lead';
        const params = new URLSearchParams(window.location.search);
        const link = document.getElementById('whatsapp-link');

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            return parts.length === 2 ? parts.pop().split(';').shift() : '';
        }

        function createLeadId() {
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const random = Math.random().toString(36).slice(2, 8).toUpperCase();
            return `${leadPrefix}-${date}-${random}`;
        }

        function getAttribution() {
            const keys = [
                'utm_source',
                'utm_medium',
                'utm_campaign',
                'utm_content',
                'utm_term',
                'fbclid',
                'campaign_id',
                'adset_id',
                'ad_id'
            ];

            return keys.reduce((data, key) => {
                const value = params.get(key);
                if (value) data[key] = value;
                return data;
            }, {});
        }

        const leadData = {
            lead_id: params.get('lead_id') || createLeadId(),
            created_at: new Date().toISOString(),
            event_source_url: params.get('source_url') || document.referrer || window.location.href,
            page_path: window.location.pathname,
            fbp: getCookie('_fbp'),
            fbc: getCookie('_fbc'),
            ...getAttribution()
        };

        localStorage.setItem(storageKey, JSON.stringify(leadData));

        const baseMessage = params.get('text') || fallbackText;
        const message = `${baseMessage}\n\nCódigo do atendimento: ${leadData.lead_id}`;
        const whatsappUrl = `https://wa.me/5585992300926?${new URLSearchParams({ text: message }).toString()}`;
        link.href = whatsappUrl;

        if (typeof fbq === 'function') {
            fbq('track', 'Contact', {
                content_name: 'whatsapp_redirect',
                content_category: 'lead',
                lead_id: leadData.lead_id
            }, {
                eventID: leadData.lead_id
            });
            fbq('trackCustom', 'WhatsAppClick', {
                source: 'redirect_page',
                page_path: window.location.pathname,
                lead_id: leadData.lead_id,
                utm_campaign: leadData.utm_campaign || '',
                ad_id: leadData.ad_id || ''
            }, {
                eventID: `${leadData.lead_id}-whatsapp`
            });
        }

        setTimeout(() => {
            window.location.href = whatsappUrl;
        }, 900);
    </script>
</body>

</html>
